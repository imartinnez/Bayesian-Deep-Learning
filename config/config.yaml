data:
  symbol: BTCUSDT
  interval: 1d
  start_date: "2018-01-01"
  end_date: "2025-12-31"

features:
  window: 30
  horizon: 5
  columns:
    - log_return
    - hl_range
    - log_rv_5d
    - log_rv_20d
    - log_volume

splits:
  train_end: "2021-12-31"
  val_end: "2022-12-31"

training:
  batch_size: 64
  hidden_size: 64
  num_layers: 1
  dense_size: 32
  dropout: 0.0
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_epochs: 200
  patience: 20
  seed: 42
  num_workers: 0
  scheduler_patience: 7
  scheduler_factor: 0.5

paths:
  raw: data/raw
  processed: data/processed
  splits: data/splits
  raw_filename: btcusdt_daily.csv
  processed_filename: btcusdt_features.parquet
  train_filename: train.parquet
  val_filename: val.parquet
  test_filename: test.parquet
  scaler_filename: feature_scaler.joblib
  train_windows_filename: train_windows.npz
  val_windows_filename: val_windows.npz
  test_windows_filename: test_windows.npz
  models: outputs/models
  figures: outputs/figures
  baseline_checkpoint: LSTM.pt
  loss_curve_filename: LSTM_loss_curve.png
  pred_plot_filename: LSTM_pred_vs_real.png

api:
  base_url: https://data-api.binance.vision
  klines_endpoint: /api/v3/klines
  limit: 1000